<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RatePro</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #f8fafc 0%, #eef2ff 100%);
      color: #1e293b;
      padding: 20px 16px 40px;
      line-height: 1.5;
      min-height: 100vh;
    }
    .container { max-width: 480px; margin: 0 auto; }
    
    header { text-align: center; margin-bottom: 24px; }
    .logo {
      display: inline-flex; align-items: center; gap: 10px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      padding: 12px 20px; border-radius: 16px; color: white;
      font-weight: 700; font-size: 20px;
      box-shadow: 0 6px 18px rgba(99,102,241,0.3);
    }
    
    .steps { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
    .step-dot { width: 10px; height: 10px; border-radius: 50%; background: #cbd5e1; transition: all 0.3s; }
    .step-dot.active { background: #6366f1; transform: scale(1.3); }
    .step-dot.done { background: #10b981; }

    .card {
      background: white; border-radius: 18px; padding: 24px;
      margin-bottom: 18px; box-shadow: 0 6px 20px rgba(0,0,0,0.06);
      border: 1px solid #e2e8f0; animation: fadeUp 0.4s ease both;
    }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

    .card-title { font-size: 18px; font-weight: 700; margin-bottom: 18px; display: flex; align-items: center; gap: 8px; padding-bottom: 12px; border-bottom: 1px dashed #e2e8f0; }

    label { display: block; font-size: 14px; font-weight: 600; color: #475569; margin-bottom: 8px; }
    input[type="number"] {
      width: 100%; padding: 14px 16px; font-size: 18px; font-weight: 600;
      border: 2px solid #e2e8f0; border-radius: 12px; outline: none; background: #fafbfe;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input[type="number"]:focus { border-color: #6366f1; background: white; box-shadow: 0 0 0 3px rgba(99,102,241,0.15); }
    input::placeholder { color: #cbd5e1; }
    .unit-group { display: flex; gap: 10px; margin-top: 8px; }
    .unit-btn {
      flex: 1; padding: 12px; border: 2px solid #e2e8f0; border-radius: 12px;
      background: #f8fafc; font-weight: 600; cursor: pointer; transition: all 0.2s;
    }
    .unit-btn.active { background: #6366f1; border-color: #6366f1; color: white; box-shadow: 0 4px 12px rgba(99,102,241,0.25); }

    .btn {
      width: 100%; padding: 16px; background: #6366f1; color: white;
      border: none; border-radius: 12px; font-size: 16px; font-weight: 700;
      cursor: pointer; margin-top: 14px; transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(99,102,241,0.3); }
    .btn:disabled { background: #cbd5e1; cursor: not-allowed; }
    .btn.secondary { background: transparent; color: #475569; border: 2px solid #e2e8f0; margin-top: 10px; }
    .btn.secondary:hover:not(:disabled) { background: #f8fafc; border-color: #cbd5e1; }

    .result {
      text-align: center; background: linear-gradient(135deg, #f8fafc 0%, #f0fdf4 100%);
      border: 2px solid #bfdbfe; padding: 28px 20px; animation: popIn 0.4s ease both;
    }
    @keyframes popIn { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }

    .res-label { font-size: 16px; font-weight: 600; color: #475569; margin-bottom: 8px; }
    .result-amount {
      font-size: 56px; font-weight: 900; color: #6366f1;
      margin: 10px 0 18px; line-height: 1;
      background: linear-gradient(135deg, #4f46e5, #10b981);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      text-shadow: 0 2px 10px rgba(0,0,0,0.05);
    }

    .summary-card {
      background: white; border-radius: 14px; padding: 16px;
      margin: 18px 0 22px; border: 1px solid #e2e8f0;
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.04);
    }
    .sum-item { text-align: center; padding: 6px; }
    .sum-lbl { font-size: 11px; color: #64748b; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .sum-val { font-size: 15px; color: #0f172a; font-weight: 700; }

    .calc-guide {
      background: #f1f5f9; border-radius: 14px; padding: 16px;
      margin: 0 0 22px; text-align: left; border: 1px solid #e2e8f0;
    }
    .calc-title { font-size: 14px; font-weight: 700; color: #334155; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
    .calc-step {
      padding: 8px 10px; margin-bottom: 6px; font-size: 14px; color: #475569;
      background: white; border-radius: 8px; border: 1px solid #e2e8f0;      display: flex; align-items: center; gap: 8px;
    }
    .calc-step .num {
      background: #6366f1; color: white; width: 22px; height: 22px;
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; flex-shrink: 0;
    }
    .calc-step strong { color: #1e293b; }
    .calc-step.final {
      background: #eef2ff; border-color: #c7d2fe; color: #4f46e5;
      font-weight: 700; font-size: 15px;
    }

    footer { text-align: center; margin-top: 30px; color: #64748b; font-size: 14px; }
    .brand { color: #6366f1; font-weight: 700; }
    .heart { color: #ef4444; animation: pulse 1.5s infinite; display: inline-block; }
    @keyframes pulse { 50% { transform: scale(1.2); } }

    .hidden { display: none !important; }
    .error { color: #ef4444; font-size: 13px; margin-top: 8px; display: none; background: #fef2f2; padding: 8px 10px; border-radius: 8px; border-left: 3px solid #ef4444; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">⚖️ RatePro</div>
    </header>

    <div class="steps">
      <div class="step-dot active" id="d1"></div>
      <div class="step-dot" id="d2"></div>
      <div class="step-dot" id="d3"></div>
    </div>

    <!-- Step 1 -->
    <div class="card" id="s1">
      <div class="card-title">⚖️ वजन डालो</div>
      <label>वजन</label>
      <input type="number" id="w1" placeholder="" oninput="v1()">
      <div class="unit-group">
        <button class="unit-btn active" onclick="u(this,'g')">ग्राम</button>
        <button class="unit-btn" onclick="u(this,'kg')">किलो</button>
      </div>
      <div class="error" id="e1">⚠️ वजन डालो</div>
      <button class="btn" id="b1" onclick="n2()" disabled>आगे ➡</button>
    </div>

    <!-- Step 2 -->
    <div class="card hidden" id="s2">
      <div class="card-title">💰 दाम बताओ</div>      <label>रेट (₹ में)</label>
      <input type="number" id="p1" placeholder="" oninput="v2()">
      <div class="error" id="e2">⚠️ दाम डालो</div>
      <button class="btn" id="b2" onclick="n3()" disabled>आगे ➡</button>
      <button class="btn secondary" onclick="rst()">🔄 फिर से शुरू</button>
    </div>

    <!-- Step 3 -->
    <div class="card hidden" id="s3">
      <div class="card-title">📦 अब कितना चाहिए?</div>
      <label>वजन</label>
      <input type="number" id="w2" placeholder="" oninput="v3()">
      <div class="unit-group">
        <button class="unit-btn active" onclick="u(this,'g')">ग्राम</button>
        <button class="unit-btn" onclick="u(this,'kg')">किलो</button>
      </div>
      <div class="error" id="e3">⚠️ वजन डालो</div>
      <button class="btn" id="b3" onclick="calc()" disabled>💰 हिसाब लगाओ</button>
      <button class="btn secondary" onclick="rst()">🔄 नया हिसाब</button>
    </div>

    <!-- Result -->
    <div class="card result hidden" id="res">
      <div class="res-label">💳 कुल देने हैं</div>
      <div class="result-amount" id="amt">₹0</div>
      
      <div class="summary-card">
        <div class="sum-item"><div class="sum-lbl">पहला वजन</div><div class="sum-val" id="sv1">-</div></div>
        <div class="sum-item"><div class="sum-lbl">दाम</div><div class="sum-val" id="sv2">-</div></div>
        <div class="sum-item"><div class="sum-lbl">नया वजन</div><div class="sum-val" id="sv3">-</div></div>
      </div>

      <div class="calc-guide">
        <div class="calc-title">📐 हिसाब कैसे बना?</div>
        <div class="calc-step" id="c1"></div>
        <div class="calc-step" id="c2"></div>
        <div class="calc-step" id="c3"></div>
        <div class="calc-step final" id="c4"></div>
      </div>

      <button class="btn" style="background:#10b981" onclick="cp()">📋 कॉपी करो</button>
      <button class="btn secondary" onclick="rst()">🔄 नया शुरू करो</button>
    </div>

    <footer>Powered by <span class="brand">Piyuneel</span> <span class="heart">❤️</span></footer>
  </div>

  <script>
    let d = { bu:'g', bw:0, price:0, tu:'g', tw:0 };
    function u(btn, val) {
      btn.parentElement.querySelectorAll('.unit-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      if(!document.getElementById('s1').classList.contains('hidden')) d.bu = val;
      else d.tu = val;
    }

    function v1() { document.getElementById('b1').disabled = !parseFloat(document.getElementById('w1').value); document.getElementById('e1').style.display='none'; }
    function v2() { document.getElementById('b2').disabled = !parseFloat(document.getElementById('p1').value); document.getElementById('e2').style.display='none'; }
    function v3() { document.getElementById('b3').disabled = !parseFloat(document.getElementById('w2').value); document.getElementById('e3').style.display='none'; }

    function n2() {
      const w = parseFloat(document.getElementById('w1').value);
      if(!w) { document.getElementById('e1').style.display='block'; return; }
      d.bw = w;
      document.getElementById('s1').classList.add('hidden');
      document.getElementById('s2').classList.remove('hidden');
      document.getElementById('d1').classList.replace('active','done');
      document.getElementById('d2').classList.add('active');
      document.getElementById('p1').focus();
    }

    function n3() {
      const p = parseFloat(document.getElementById('p1').value);
      if(!p) { document.getElementById('e2').style.display='block'; return; }
      d.price = p;
      document.getElementById('s2').classList.add('hidden');
      document.getElementById('s3').classList.remove('hidden');
      document.getElementById('d2').classList.replace('active','done');
      document.getElementById('d3').classList.add('active');
      document.getElementById('w2').focus();
    }

    function calc() {
      const w = parseFloat(document.getElementById('w2').value);
      if(!w) { document.getElementById('e3').style.display='block'; return; }
      d.tw = w;

      const baseGrams = d.bu === 'kg' ? d.bw * 1000 : d.bw;
      const pricePerGram = d.price / baseGrams;
      const targetGrams = d.tu === 'kg' ? d.tw * 1000 : d.tw;
      const amt = Math.round(targetGrams * pricePerGram);

      document.getElementById('amt').textContent = '₹' + amt.toLocaleString('en-IN');
      document.getElementById('sv1').textContent = `${d.bw} ${d.bu === 'g' ? 'ग्राम' : 'किलो'}`;
      document.getElementById('sv2').textContent = '₹' + d.price.toLocaleString('en-IN');
      document.getElementById('sv3').textContent = `${d.tw} ${d.tu === 'g' ? 'ग्राम' : 'किलो'}`;

      document.getElementById('c1').innerHTML = `<span class="num">1</span> पहले: <strong>${d.bw} ${d.bu}</strong> का दाम <strong>₹${d.price.toLocaleString('en-IN')}</strong> था`;
      document.getElementById('c2').innerHTML = `<span class="num">2</span> 1 ग्राम का रेट: ₹${d.price} ÷ ${baseGrams}g = <strong>₹${pricePerGram.toFixed(4)}</strong>/g`;      document.getElementById('c3').innerHTML = `<span class="num">3</span> अब ${d.tw} ${d.tu} × ₹${pricePerGram.toFixed(4)}`;
      document.getElementById('c4').innerHTML = `<span class="num">✓</span> कुल: <strong>₹${amt.toLocaleString('en-IN')}</strong> देने हैं`;

      document.getElementById('s3').classList.add('hidden');
      document.getElementById('res').classList.remove('hidden');
      document.getElementById('d3').classList.replace('active','done');
    }

    function rst() {
      ['w1','p1','w2'].forEach(id => document.getElementById(id).value = '');
      ['s1','s2','s3','res'].forEach(id => document.getElementById(id).classList.add('hidden'));
      document.getElementById('s1').classList.remove('hidden');
      document.getElementById('d1').className = 'step-dot active';
      document.getElementById('d2').className = 'step-dot';
      document.getElementById('d3').className = 'step-dot';
      ['b1','b2','b3'].forEach(id => document.getElementById(id).disabled = true);
      document.querySelectorAll('.unit-btn').forEach(b => b.classList.toggle('active', b.textContent.includes('ग्राम')));
      d = { bu:'g', bw:0, price:0, tu:'g', tw:0 };
      document.getElementById('w1').focus();
    }

    function cp() {
      navigator.clipboard.writeText(document.getElementById('amt').textContent);
      alert('✅ कॉपी हो गया!');
    }
  </script>
</body>
</html>
